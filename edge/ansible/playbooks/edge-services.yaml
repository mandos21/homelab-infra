- name: Deploy edge support services
  hosts: edge_hosts
  become: true
  gather_facts: true
  vars_files:
    - ../group_vars/all.yaml

  tasks:
    - name: Ensure fallback page directory exists
      ansible.builtin.file:
        path: "{{ edge_caddy_fallback_error_root }}"
        state: directory
        owner: caddy
        group: caddy
        mode: "0755"

    - name: Install fallback maintenance page
      ansible.builtin.template:
        src: ../templates/caddy/fallback-index.html.j2
        dest: "{{ edge_caddy_fallback_error_root }}/index.html"
        owner: caddy
        group: caddy
        mode: "0644"

    - name: Ensure Uptime Kuma directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ edge_kuma_base_dir }}"
        - "{{ edge_kuma_data_dir }}"
      when: edge_kuma_enabled

    - name: Install Uptime Kuma compose stack
      ansible.builtin.template:
        src: ../templates/edge-services/uptime-kuma-compose.yaml.j2
        dest: "{{ edge_kuma_base_dir }}/docker-compose.yaml"
        mode: "0644"
      when: edge_kuma_enabled

    - name: Check for legacy Uptime Kuma container
      ansible.builtin.command:
        argv:
          - docker
          - container
          - inspect
          - "{{ edge_kuma_legacy_container_name }}"
      register: edge_kuma_legacy_container
      changed_when: false
      failed_when: false
      when: edge_kuma_enabled

    - name: Check for managed Uptime Kuma container
      ansible.builtin.command:
        argv:
          - docker
          - container
          - inspect
          - "{{ edge_kuma_container_name }}"
      register: edge_kuma_managed_container
      changed_when: false
      failed_when: false
      when: edge_kuma_enabled

    - name: Stop legacy Uptime Kuma container before data migration
      ansible.builtin.command:
        argv:
          - docker
          - stop
          - "{{ edge_kuma_legacy_container_name }}"
      when:
        - edge_kuma_enabled
        - edge_kuma_migrate_legacy
        - edge_kuma_legacy_container.rc == 0

    - name: Copy legacy Uptime Kuma data into bind mount
      ansible.builtin.shell: >-
        docker run --rm
        -v {{ edge_kuma_legacy_volume_name }}:/from
        -v {{ edge_kuma_data_dir }}:/to
        alpine:3.22
        sh -c 'cp -a /from/. /to/'
      when:
        - edge_kuma_enabled
        - edge_kuma_migrate_legacy
        - edge_kuma_legacy_container.rc == 0

    - name: Remove legacy Uptime Kuma container after migration
      ansible.builtin.command:
        argv:
          - docker
          - rm
          - "{{ edge_kuma_legacy_container_name }}"
      when:
        - edge_kuma_enabled
        - edge_kuma_migrate_legacy
        - edge_kuma_legacy_container.rc == 0

    - name: Remove failed managed Uptime Kuma container before restart
      ansible.builtin.command:
        argv:
          - docker
          - rm
          - -f
          - "{{ edge_kuma_container_name }}"
      when:
        - edge_kuma_enabled
        - edge_kuma_managed_container.rc == 0

    - name: Start or update Uptime Kuma container
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - -f
          - "{{ edge_kuma_base_dir }}/docker-compose.yaml"
          - up
          - -d
      register: edge_kuma_compose_up
      changed_when: >-
        'Started' in edge_kuma_compose_up.stdout or
        'Recreated' in edge_kuma_compose_up.stdout or
        'Creating' in edge_kuma_compose_up.stdout
      when: edge_kuma_enabled
