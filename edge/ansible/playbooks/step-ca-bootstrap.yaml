- name: Bootstrap dedicated step-ca for k3s ingress PKI
  hosts: step_ca_hosts
  become: true
  gather_facts: true
  vars_files:
    - ../group_vars/all.yaml
  pre_tasks:
    - name: Load encrypted edge secrets
      community.sops.load_vars:
        file: "{{ playbook_dir }}/../group_vars/secrets.sops.yaml"

  vars:
    _step_ca_name: "{{ step_ca_name }}"
    _step_ca_image: "{{ step_ca_image }}"
    _step_ca_container_name: "{{ step_ca_container_name }}"
    _step_ca_base_dir: "{{ step_ca_base_dir }}"
    _step_ca_config_dir: "{{ _step_ca_base_dir }}/config"
    _step_ca_certs_dir: "{{ _step_ca_base_dir }}/certs"
    _step_ca_secrets_dir: "{{ _step_ca_base_dir }}/secrets"
    _step_ca_db_dir: "{{ _step_ca_base_dir }}/db"
    _step_ca_dns_names: "{{ step_ca_dns_names }}"
    _step_ca_host_port: "{{ step_ca_host_port }}"
    _step_ca_host_bind_address: "{{ step_ca_host_bind_address }}"
    _step_ca_listen_address: ":9000"
    _step_ca_provisioner_name: "{{ step_ca_provisioner_name }}"
    _step_ca_uid: "{{ step_ca_uid }}"
    _step_ca_gid: "{{ step_ca_gid }}"
    step_ca_password_file_src: "{{ step_ca_password_file_src | default('') }}"
    step_ca_provisioner_password_file_src: "{{ step_ca_provisioner_password_file_src | default('') }}"
    step_ca_artifacts_dir: "{{ playbook_dir }}/../artifacts/step-ca/{{ inventory_hostname }}"
    step_ca_ca_url: "https://{{ _step_ca_dns_names[0] }}:{{ _step_ca_host_port }}"
    step_ca_init_command: >-
      docker run --rm
      -v {{ _step_ca_base_dir }}:/home/step
      {{ _step_ca_image }}
      step ca init
      --name {{ _step_ca_name | quote }}
      {% for dns_name in _step_ca_dns_names %}--dns {{ dns_name | quote }} {% endfor %}
      --address {{ _step_ca_listen_address | quote }}
      --provisioner {{ _step_ca_provisioner_name | quote }}
      --password-file /home/step/secrets/password
      --provisioner-password-file /home/step/secrets/provisioner_password

  tasks:
    - name: Assert step-ca credentials are available
      ansible.builtin.assert:
        that:
          - (step_ca_password | default('') | length > 0) or (step_ca_password_file_src | length > 0)
          - (step_ca_provisioner_password | default('') | length > 0) or (step_ca_provisioner_password_file_src | length > 0)
        fail_msg: >-
          Provide step_ca_password and step_ca_provisioner_password in secrets.sops.yaml, or pass
          step_ca_password_file_src and step_ca_provisioner_password_file_src at runtime.

    - name: Ensure Docker is installed on the CA host
      ansible.builtin.command: docker version
      register: step_ca_docker_check
      changed_when: false

    - name: Ensure step-ca directory structure exists
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ _step_ca_base_dir }}"
        - "{{ _step_ca_config_dir }}"
        - "{{ _step_ca_certs_dir }}"
        - "{{ _step_ca_secrets_dir }}"
        - "{{ _step_ca_db_dir }}"

    - name: Ensure step-ca directories are owned by the container user
      ansible.builtin.file:
        path: "{{ _step_ca_base_dir }}"
        state: directory
        owner: "{{ _step_ca_uid }}"
        group: "{{ _step_ca_gid }}"
        recurse: true

    - name: Install CA password file from encrypted vars
      ansible.builtin.copy:
        content: "{{ step_ca_password }}"
        dest: "{{ _step_ca_secrets_dir }}/password"
        mode: "0644"
        owner: "{{ _step_ca_uid }}"
        group: "{{ _step_ca_gid }}"
      when: step_ca_password | default('') | length > 0

    - name: Install CA password file from local source
      ansible.builtin.copy:
        src: "{{ step_ca_password_file_src }}"
        dest: "{{ _step_ca_secrets_dir }}/password"
        mode: "0644"
        owner: "{{ _step_ca_uid }}"
        group: "{{ _step_ca_gid }}"
      when:
        - step_ca_password | default('') | length == 0
        - step_ca_password_file_src | length > 0

    - name: Install provisioner password file from encrypted vars
      ansible.builtin.copy:
        content: "{{ step_ca_provisioner_password }}"
        dest: "{{ _step_ca_secrets_dir }}/provisioner_password"
        mode: "0644"
        owner: "{{ _step_ca_uid }}"
        group: "{{ _step_ca_gid }}"
      when: step_ca_provisioner_password | default('') | length > 0

    - name: Install provisioner password file from local source
      ansible.builtin.copy:
        src: "{{ step_ca_provisioner_password_file_src }}"
        dest: "{{ _step_ca_secrets_dir }}/provisioner_password"
        mode: "0644"
        owner: "{{ _step_ca_uid }}"
        group: "{{ _step_ca_gid }}"
      when:
        - step_ca_provisioner_password | default('') | length == 0
        - step_ca_provisioner_password_file_src | length > 0

    - name: Check whether step-ca has already been initialized
      ansible.builtin.stat:
        path: "{{ _step_ca_config_dir }}/ca.json"
      register: step_ca_config

    - name: Initialize dedicated step-ca
      ansible.builtin.shell: "{{ step_ca_init_command }}"
      args:
        creates: "{{ _step_ca_config_dir }}/ca.json"
      when: not step_ca_config.stat.exists

    - name: Install dedicated step-ca compose stack
      ansible.builtin.template:
        src: ../templates/step-ca/docker-compose.yaml.j2
        dest: "{{ _step_ca_base_dir }}/docker-compose.yaml"
        mode: "0644"
      register: step_ca_compose

    - name: Start or update dedicated step-ca container
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - -f
          - "{{ _step_ca_base_dir }}/docker-compose.yaml"
          - up
          - -d
      register: step_ca_compose_up
      changed_when: "'Started' in step_ca_compose_up.stdout or 'Recreated' in step_ca_compose_up.stdout or 'Creating' in step_ca_compose_up.stdout"

    - name: Wait for step-ca HTTPS listener
      ansible.builtin.wait_for:
        host: "{{ ansible_host | default(inventory_hostname) }}"
        port: "{{ _step_ca_host_port }}"
        timeout: 120

    - name: Read root fingerprint
      ansible.builtin.command:
        argv:
          - docker
          - run
          - --rm
          - -v
          - "{{ _step_ca_base_dir }}:/home/step"
          - "{{ _step_ca_image }}"
          - step
          - certificate
          - fingerprint
          - /home/step/certs/root_ca.crt
      register: step_ca_root_fingerprint
      changed_when: false

    - name: Read step-ca configuration
      ansible.builtin.slurp:
        src: "{{ _step_ca_config_dir }}/ca.json"
      register: step_ca_ca_json_raw

    - name: Extract provisioner kid from step-ca configuration
      ansible.builtin.set_fact:
        step_ca_provisioner_kid: >-
          {{
            (
              step_ca_ca_json_raw.content
              | b64decode
              | from_json
            ).authority.provisioners
            | selectattr('name', 'equalto', _step_ca_provisioner_name)
            | map(attribute='key.kid')
            | first
          }}

    - name: Ensure local step-ca artifacts directory exists
      ansible.builtin.file:
        path: "{{ step_ca_artifacts_dir }}"
        state: directory
        mode: "0755"
      delegate_to: localhost
      become: false

    - name: Fetch root CA certificate for cluster bootstrap
      ansible.builtin.fetch:
        src: "{{ _step_ca_certs_dir }}/root_ca.crt"
        dest: "{{ step_ca_artifacts_dir }}/root_ca.crt"
        flat: true

    - name: Fetch intermediate CA certificate for reference
      ansible.builtin.fetch:
        src: "{{ _step_ca_certs_dir }}/intermediate_ca.crt"
        dest: "{{ step_ca_artifacts_dir }}/intermediate_ca.crt"
        flat: true

    - name: Write bootstrap metadata locally
      ansible.builtin.copy:
        dest: "{{ step_ca_artifacts_dir }}/bootstrap.txt"
        mode: "0644"
        content: |
          step-ca URL: {{ step_ca_ca_url }}
          step-ca DNS names: {{ _step_ca_dns_names | join(', ') }}
          step-ca provisioner: {{ _step_ca_provisioner_name }}
          step-ca provisioner kid: {{ step_ca_provisioner_kid }}
          root fingerprint: {{ step_ca_root_fingerprint.stdout | trim }}
      delegate_to: localhost
      become: false

    - name: Print next-step summary
      ansible.builtin.debug:
        msg:
          - "Dedicated step-ca is available at {{ step_ca_ca_url }}"
          - "Root certificate fetched to {{ step_ca_artifacts_dir }}/root_ca.crt"
          - "Root fingerprint: {{ step_ca_root_fingerprint.stdout | trim }}"
