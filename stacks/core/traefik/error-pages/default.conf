server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  charset utf-8;

  location = /error.html { }
  location = /404.html { }
  location = /maintenance.html { }

  location / {
    return 404;
  }

  error_page 404 /404.html;
  error_page 503 /maintenance.html;
  error_page 500 502 503 504 /error.html;
}
