<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Service Unavailable</title>
    <style>
      body { font-family: ui-sans-serif, system-ui, sans-serif; margin: 0; background: #0b0f14; color: #e6edf3; }
      .wrap { min-height: 100vh; display: grid; place-items: center; padding: 40px; }
      .card { max-width: 720px; background: #111823; border: 1px solid #1f2a3a; border-radius: 14px; padding: 28px; }
      h1 { margin: 0 0 8px; font-size: 28px; }
      p { margin: 0 0 14px; color: #a7b4c2; }
      code { background: #0b0f14; padding: 2px 6px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Service temporarily unavailable</h1>
        <p>The service behind this address is down or restarting.</p>
        <p>If this persists, check the container status or your reverse proxy logs.</p>
        <p><code>Traefik</code> served this fallback page.</p>
      </div>
    </div>
  </body>
</html>
