http:
  serversTransports:
    plex-insecure:
      insecureSkipVerify: true
    nextcloud-insecure:
      insecureSkipVerify: true

  routers:
    photos:
      rule: Host(`photos.mdegenaro.com`)
      entryPoints:
        - websecure
      tls: {}
      service: photos

    plex:
      rule: Host(`plex.mdegenaro.com`)
      entryPoints:
        - websecure
      tls: {}
      service: plex

  services:
    photos:
      loadBalancer:
        servers:
          - url: http://192.168.1.199:80

    plex:
      loadBalancer:
        serversTransport: plex-insecure
        servers:
          - url: https://192.168.1.231:32400
