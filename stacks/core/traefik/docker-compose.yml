services:
  traefik:
    image: traefik:v3.6.6
    container_name: traefik
    restart: unless-stopped
    command:
      - --acceslog=true
      - --accesslog.format=json
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=traefik-proxy
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.forwardedheaders.trustedips=192.168.1.78/32
      - --entrypoints.web.forwardedheaders.trustedips=192.168.1.78/32
      #- --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      #- --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      #- --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      #- --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --serversTransport.insecureSkipVerify=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "/mnt/user/appdata/traefik/letsencrypt:/letsencrypt"
      - "${TRAEFIK_DYNAMIC_DIR:-/mnt/user/appdata/traefik/dynamic}:/etc/traefik/dynamic"
      - "/boot/traefik/certs:/etc/traefik/dynamic/certs:ro"
    networks:
      - traefik-proxy
#  error-pages:
#    image: nginx:alpine
#    container_name: traefik-error-pages
#    restart: unless-stopped
#    volumes:
#      - "./error-pages:/usr/share/nginx/html:ro"
#      - "./error-pages/default.conf:/etc/nginx/conf.d/default.conf:ro"
#    networks:
#      - traefik-proxy

networks:
  traefik-proxy:
    name: traefik-proxy
