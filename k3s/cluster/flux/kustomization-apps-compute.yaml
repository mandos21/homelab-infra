apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-compute
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./k3s/cluster/apps/compute
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab-infra
  dependsOn:
    - name: infra
    - name: secrets
  wait: true
  timeout: 10m0s
