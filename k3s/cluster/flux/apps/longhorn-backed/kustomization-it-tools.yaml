apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: it-tools
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./k3s/cluster/apps/longhorn-backed/it-tools
  prune: true
  deletionPolicy: Orphan
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: infra
  timeout: 10m0s
