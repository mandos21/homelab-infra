apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: secrets
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./k3s/cluster/secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab-infra
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  wait: true
  timeout: 3m0s
