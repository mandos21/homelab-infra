apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-nas-attached
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./k3s/cluster/apps/nas-attached
  prune: true
  sourceRef:
    kind: GitRepository
