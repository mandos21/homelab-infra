apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: picard
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./k3s/cluster/apps/nas-attached/picard
  prune: true
  deletionPolicy: Orphan
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  dependsOn:
    - name: infra
    - name: metallb-config
    - name: cert-manager-config
    - name: traefik-config
    - name: secrets
    - name: nas-common
  wait: true
  timeout: 10m0s
