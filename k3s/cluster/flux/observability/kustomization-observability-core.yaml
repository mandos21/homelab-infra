apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: observability-core
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./k3s/cluster/infra/observability/core
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: infra
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  wait: true
  timeout: 10m0s
