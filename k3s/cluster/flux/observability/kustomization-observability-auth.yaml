apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: observability-auth
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./k3s/cluster/infra/observability/auth
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: observability-core
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  wait: true
  timeout: 10m0s
