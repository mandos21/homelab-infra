apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: observability-alerts
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./k3s/cluster/infra/observability/alerts
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: observability-core
  wait: true
  timeout: 10m0s
