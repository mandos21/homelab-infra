apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: calibre
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./k3s/cluster/apps/nas-attached/calibre
  prune: true
  deletionPolicy: Orphan
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: infra
    - name: metallb-config
    - name: cert-manager-config
    - name: traefik-config
    - name: nas-common
  wait: true
  timeout: 10m0s
