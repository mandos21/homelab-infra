apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy
  namespace: ntfy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ntfy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ntfy
    spec:
      nodeSelector:
        node-type: baremetal
      containers:
        - name: ntfy
          image: binwiederhier/ntfy:v2.22
          args:
            - serve
          ports:
            - name: http
              containerPort: 80
          envFrom:
            - configMapRef:
                name: ntfy-config
            - secretRef:
                name: ntfy-secrets
          readinessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/ntfy
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ntfy-data
