apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 30m0s
  chart:
    spec:
      chart: cert-manager
      # Update to a current cert-manager chart version before first apply.
      version: "v1.15.3"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
  values:
    installCRDs: true
