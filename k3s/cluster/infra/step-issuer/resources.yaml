apiVersion: v1
kind: Namespace
metadata:
  name: step-issuer-system
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: smallstep
  namespace: flux-system
spec:
  interval: 1h0s
  url: https://smallstep.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: step-issuer
  namespace: step-issuer-system
spec:
  interval: 30m0s
  chart:
    spec:
      chart: step-issuer
      version: "1.9.9"
      sourceRef:
        kind: HelmRepository
        name: smallstep
        namespace: flux-system
  values:
    replicaCount: 1
    nodeSelector:
      node-type: baremetal
