apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: observability-core
  namespace: monitoring
spec:
  interval: 30m0s
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "85.2.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: observability-core-values
      valuesKey: values.yaml
    - kind: Secret
      name: observability-core-secret-values
      valuesKey: values.yaml
