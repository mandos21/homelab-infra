apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-core-values
  namespace: observability
data:
  values.yaml: |
    crds:
      enabled: true

    grafana:
      enabled: true
      # Keep Grafana internal until ingress and auth are designed.
      ingress:
        enabled: false
      service:
        type: ClusterIP
      persistence:
        enabled: true
        type: pvc
        storageClassName: longhorn
        accessModes:
          - ReadWriteOnce
        size: 10Gi
      nodeSelector:
        node-type: baremetal
      adminUser: admin
      additionalDataSources:
        - name: Loki
          uid: loki
          type: loki
          access: proxy
          url: http://loki-gateway.observability.svc.cluster.local
          isDefault: false
          jsonData:
            maxLines: 1000

    alertmanager:
      enabled: true
      alertmanagerSpec:
        nodeSelector:
          node-type: baremetal
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 5Gi

    prometheus:
      enabled: true
      prometheusSpec:
        retention: 15d
        retentionSize: 40GiB
        nodeSelector:
          node-type: baremetal
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 50Gi

    prometheusOperator:
      nodeSelector:
        node-type: baremetal

    kube-state-metrics:
      nodeSelector:
        node-type: baremetal
