apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-core-values
  namespace: observability
data:
  values.yaml: |
    crds:
      enabled: true

    grafana:
      enabled: true
      # Exposed through oauth2-proxy; keep the Grafana service itself internal.
      ingress:
        enabled: false
      service:
        type: ClusterIP
      grafana.ini:
        server:
          root_url: https://grafana.dege.app
        auth:
          disable_login_form: true
        auth.proxy:
          enabled: true
          header_name: X-Forwarded-User
          header_property: username
          auto_sign_up: true
          sync_ttl: 15
          whitelist: 10.42.0.0/16
          headers: Email:X-Forwarded-Email
        users:
          auto_assign_org: true
          auto_assign_org_role: Admin
      persistence:
        enabled: true
        type: pvc
        storageClassName: longhorn
        accessModes:
          - ReadWriteOnce
        size: 10Gi
      nodeSelector:
        node-type: baremetal
      adminUser: admin
      additionalDataSources:
        - name: Loki
          uid: loki
          type: loki
          access: proxy
          url: http://loki-gateway.observability.svc.cluster.local
          isDefault: false
          jsonData:
            maxLines: 1000

    alertmanager:
      enabled: true
      config:
        global:
          resolve_timeout: 5m
        route:
          receiver: ntfy
          group_by:
            - alertname
            - namespace
            - severity
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          routes:
            - matchers:
                - alertname = "Watchdog"
              receiver: "null"
            - matchers:
                - alertname = "InfoInhibitor"
              receiver: "null"
        inhibit_rules:
          - source_matchers:
              - severity="critical"
            target_matchers:
              - severity="warning"
            equal:
              - alertname
              - namespace
          - source_matchers:
              - severity="warning"
            target_matchers:
              - severity="info"
            equal:
              - alertname
              - namespace
          - source_matchers:
              - alertname="InfoInhibitor"
            target_matchers:
              - severity="info"
            equal:
              - namespace
        receivers:
          - name: "null"
          - name: ntfy
            webhook_configs:
              - url: http://alertmanager-ntfy.observability.svc.cluster.local:8000/hook
                send_resolved: true
      alertmanagerSpec:
        nodeSelector:
          node-type: baremetal
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 5Gi

    prometheus:
      enabled: true
      prometheusSpec:
        retention: 15d
        retentionSize: 40GiB
        nodeSelector:
          node-type: baremetal
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 50Gi

    prometheusOperator:
      nodeSelector:
        node-type: baremetal

    kube-state-metrics:
      nodeSelector:
        node-type: baremetal
