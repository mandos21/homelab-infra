apiVersion: v1
kind: Secret
metadata:
  name: observability-core-secret-values
  namespace: observability
type: Opaque
stringData:
  values.yaml: |
    alertmanager:
      config:
        global:
          resolve_timeout: 5m
        route:
          receiver: ntfy
          group_by:
            - alertname
            - namespace
            - severity
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
        inhibit_rules:
          - source_matchers:
              - severity="critical"
            target_matchers:
              - severity="warning"
            equal:
              - alertname
              - namespace
        receivers:
          - name: "null"
          - name: ntfy
            webhook_configs:
              - url: http://alertmanager-ntfy.observability.svc.cluster.local:8000/hook
                send_resolved: true
