apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: test-alert
  namespace: observability
spec:
  groups:
    - name: test.rules
      rules:
        - alert: AlwaysFiringTestAlert
          expr: vector(1)
          for: 1m
          labels:
            severity: warning
            category: test
          annotations:
            summary: Test alert for ntfy delivery
            description: This is a temporary end-to-end alert used to validate Prometheus, Alertmanager, alertmanager-ntfy, and ntfy delivery.
