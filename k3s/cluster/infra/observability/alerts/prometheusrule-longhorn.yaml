apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: longhorn
  namespace: observability
  labels:
    release: observability-core
spec:
  groups:
    - name: longhorn.rules
      rules:
        - alert: LonghornNodeNotReady
          expr: longhorn_node_status{condition="ready"} != 1
          for: 10m
          labels:
            severity: critical
            category: longhorn
          annotations:
            summary: Longhorn node is not ready
            description: Longhorn node {{ $labels.node }} has not been ready for at least 10 minutes.

        - alert: LonghornDiskNotReady
          expr: longhorn_disk_status{condition="ready"} != 1
          for: 15m
          labels:
            severity: warning
            category: longhorn
          annotations:
            summary: Longhorn disk is not ready
            description: Longhorn disk {{ $labels.disk }} on node {{ $labels.node }} is not ready.

        - alert: LonghornVolumeDegraded
          expr: longhorn_volume_robustness{state="degraded"} == 1
          for: 10m
          labels:
            severity: warning
            category: longhorn
          annotations:
            summary: Longhorn volume is degraded
            description: Longhorn volume {{ $labels.volume }} (PVC {{ $labels.pvc_namespace }}/{{ $labels.pvc }}) has been degraded for at least 10 minutes.

        - alert: LonghornVolumeFaulted
          expr: longhorn_volume_robustness{state="faulted"} == 1
          for: 5m
          labels:
            severity: critical
            category: longhorn
          annotations:
            summary: Longhorn volume is faulted
            description: Longhorn volume {{ $labels.volume }} (PVC {{ $labels.pvc_namespace }}/{{ $labels.pvc }}) is faulted.

        - alert: LonghornVolumeUnknown
          expr: longhorn_volume_robustness{state="unknown"} == 1
          for: 10m
          labels:
            severity: warning
            category: longhorn
          annotations:
            summary: Longhorn volume is in unknown state
            description: Longhorn volume {{ $labels.volume }} (PVC {{ $labels.pvc_namespace }}/{{ $labels.pvc }}) has been in unknown robustness state for at least 10 minutes.

        - alert: LonghornEngineError
          expr: longhorn_engine_state{state="error"} == 1
          for: 5m
          labels:
            severity: critical
            category: longhorn
          annotations:
            summary: Longhorn engine is in error state
            description: Longhorn engine {{ $labels.engine }} for volume {{ $labels.volume }} on node {{ $labels.node }} is reporting an error state.

        - alert: LonghornReplicaError
          expr: longhorn_replica_state{state="error"} == 1
          for: 10m
          labels:
            severity: warning
            category: longhorn
          annotations:
            summary: Longhorn replica is in error state
            description: Longhorn replica {{ $labels.replica }} for volume {{ $labels.volume }} on node {{ $labels.node }} is reporting an error state.

        - alert: LonghornNodeStoragePressure
          expr: |
            longhorn_node_storage_scheduled_bytes
            /
            clamp_min(longhorn_node_storage_capacity_bytes - longhorn_node_storage_reservation_bytes, 1)
            > 0.85
          for: 15m
          labels:
            severity: warning
            category: longhorn
          annotations:
            summary: Longhorn node is running low on schedulable storage
            description: Longhorn node {{ $labels.node }} has more than 85% of usable storage scheduled.

        - alert: LonghornNodeStorageCritical
          expr: |
            longhorn_node_storage_scheduled_bytes
            /
            clamp_min(longhorn_node_storage_capacity_bytes - longhorn_node_storage_reservation_bytes, 1)
            > 0.95
          for: 15m
          labels:
            severity: critical
            category: longhorn
          annotations:
            summary: Longhorn node is nearly out of schedulable storage
            description: Longhorn node {{ $labels.node }} has more than 95% of usable storage scheduled.

        - alert: LonghornBackupFailed
          expr: |
            max by (volume, recurring_job) (
              longhorn_backup_state{recurring_job!=""} != 3
            ) > 0
          for: 30m
          labels:
            severity: warning
            category: backups
          annotations:
            summary: Longhorn backup object is not successful
            description: Longhorn recurring backup job {{ $labels.recurring_job }} has at least one non-success backup object for volume {{ $labels.volume }}.
