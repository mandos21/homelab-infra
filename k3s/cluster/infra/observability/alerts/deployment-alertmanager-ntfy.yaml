apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager-ntfy
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager-ntfy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alertmanager-ntfy
    spec:
      nodeSelector:
        node-type: baremetal
      containers:
        - name: alertmanager-ntfy
          image: ghcr.io/alexbakker/alertmanager-ntfy:1.2.1
          args:
            - --configs
            - /etc/alertmanager-ntfy/config.yml,/etc/alertmanager-ntfy/auth.yml
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager-ntfy/config.yml
              subPath: config.yml
              readOnly: true
            - name: auth
              mountPath: /etc/alertmanager-ntfy/auth.yml
              subPath: auth.yml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: alertmanager-ntfy-config
        - name: auth
          secret:
            secretName: alertmanager-ntfy-auth
