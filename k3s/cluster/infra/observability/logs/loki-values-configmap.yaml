apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-logs-loki-values
  namespace: observability
  labels:
    reconcile.fluxcd.io/watch: "Enabled"
data:
  values.yaml: |
    fullnameOverride: loki

    deploymentMode: Monolithic

    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      storage:
        type: filesystem
      limits_config:
        allow_structured_metadata: true
        volume_enabled: true
        retention_period: 168h
      compactor:
        retention_enabled: true
        delete_request_store: filesystem
      rulerConfig:
        storage:
          type: local
          local:
            directory: /var/loki/rules

    singleBinary:
      replicas: 1
      nodeSelector:
        node-type: baremetal
      persistence:
        enabled: true
        storageClass: longhorn
        size: 50Gi

    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0
    ingester:
      replicas: 0
    querier:
      replicas: 0
    queryFrontend:
      replicas: 0
    queryScheduler:
      replicas: 0
    distributor:
      replicas: 0
    compactor:
      replicas: 0
    indexGateway:
      replicas: 0
    bloomPlanner:
      replicas: 0
    bloomBuilder:
      replicas: 0
    bloomGateway:
      replicas: 0

    test:
      enabled: false

    lokiCanary:
      enabled: false

    gateway:
      enabled: true
      replicas: 1
      nodeSelector:
        node-type: baremetal

    monitoring:
      serviceMonitor:
        enabled: true
