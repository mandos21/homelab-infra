apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: observability-logs-loki
  namespace: observability
spec:
  interval: 30m0s
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: loki
      version: "13.1.2"
      sourceRef:
        kind: HelmRepository
        name: grafana-community
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: observability-logs-loki-values
      valuesKey: values.yaml
