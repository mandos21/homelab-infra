apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-oauth2-proxy
  namespace: observability
spec:
  interval: 30m0s
  chart:
    spec:
      chart: oauth2-proxy
      version: "10.4.2"
      sourceRef:
        kind: HelmRepository
        name: oauth2-proxy
        namespace: flux-system
  values:
    replicaCount: 1
    config:
      existingSecret: grafana-oauth2-proxy-secrets
      emailDomains:
        - "*"
    extraArgs:
      provider: keycloak-oidc
      oidc-issuer-url: https://id.mdegenaro.com/realms/theborocrew
      scope: openid email profile groups
      redirect-url: https://grafana.dege.app/oauth2/callback
      upstream: http://observability-core-grafana.observability.svc.cluster.local:80
      reverse-proxy: "true"
      cookie-secure: "true"
      cookie-samesite: lax
      cookie-name: __Secure-grafana_oauth2_proxy
      skip-provider-button: "true"
      pass-user-headers: "true"
      allowed-group: homelab-admins
      oidc-groups-claim: groups
    service:
      type: ClusterIP
      portNumber: 80
    ingress:
      enabled: true
      className: traefik
      path: /
      pathType: Prefix
      hosts:
        - grafana.dege.app
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
    nodeSelector:
      node-type: baremetal
