apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-oauth2-proxy
  namespace: observability
spec:
  interval: 30m0s
  chart:
    spec:
      chart: oauth2-proxy
      version: "10.4.2"
      sourceRef:
        kind: HelmRepository
        name: oauth2-proxy
        namespace: flux-system
  values:
    replicaCount: 1
    config:
      existingSecret: grafana-oauth2-proxy-secrets
      emailDomains:
        - "*"
    alphaConfig:
      enabled: true
      configData:
        providers:
          - id: keycloak
            provider: keycloak-oidc
            clientID: ${OAUTH2_PROXY_CLIENT_ID}
            clientSecret: ${OAUTH2_PROXY_CLIENT_SECRET}
            scope: openid email profile groups
            oidcConfig:
              issuerURL: https://id.mdegenaro.com/realms/theborocrew
        upstreamConfig:
          upstreams:
            - id: grafana
              path: ^/(.*)$
              rewriteTarget: /$1
              uri: http://observability-core-grafana.observability.svc.cluster.local:80
              passHostHeader: true
              proxyWebSockets: true
              flushInterval: 1s
    extraArgs:
      redirect-url: https://grafana.dege.app/oauth2/callback
      reverse-proxy: "true"
      cookie-secure: "true"
      cookie-samesite: lax
      cookie-name: __Secure-grafana_oauth2_proxy
      skip-provider-button: "true"
      pass-user-headers: "true"
      allowed-group: homelab-admins
      oidc-groups-claim: groups
    service:
      type: ClusterIP
      portNumber: 80
    ingress:
      enabled: true
      className: traefik
      path: /
      pathType: Prefix
      hosts:
        - grafana.dege.app
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
    nodeSelector:
      node-type: baremetal
