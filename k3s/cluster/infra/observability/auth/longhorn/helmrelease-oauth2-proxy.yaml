apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn-oauth2-proxy
  namespace: longhorn-system
spec:
  interval: 30m0s
  chart:
    spec:
      chart: oauth2-proxy
      version: "10.4.2"
      sourceRef:
        kind: HelmRepository
        name: oauth2-proxy
        namespace: flux-system
  values:
    replicaCount: 1
    config:
      existingSecret: longhorn-oauth2-proxy-secrets
      emailDomains:
        - "*"
    extraArgs:
      provider: keycloak-oidc
      oidc-issuer-url: https://id.dege.app/realms/theborocrew
      scope: openid email profile
      redirect-url: https://longhorn.dege.app/oauth2/callback
      upstream: http://longhorn-frontend.longhorn-system.svc.cluster.local:80
      reverse-proxy: "true"
      cookie-secure: "true"
      cookie-samesite: lax
      cookie-csrf-per-request: "true"
      cookie-csrf-expire: 5m
      cookie-name: __Secure-longhorn_oauth2_proxy
      skip-provider-button: "true"
      pass-user-headers: "true"
      skip-auth-route: GET=^/favicon\.ico$
      allowed-group: homelab-admins
      oidc-groups-claim: groups
    service:
      type: ClusterIP
      portNumber: 80
    ingress:
      enabled: true
      className: traefik
      path: /
      pathType: Prefix
      hosts:
        - longhorn.dege.app
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
    nodeSelector:
      node-type: baremetal
