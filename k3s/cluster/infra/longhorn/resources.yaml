apiVersion: v1
kind: Namespace
metadata:
  name: longhorn-system
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: longhorn
  namespace: flux-system
spec:
  interval: 1h0s
  url: https://charts.longhorn.io
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 30m0s
  chart:
    spec:
      chart: longhorn
      version: "1.10.2"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  values:
    # Keep the UI internal until ingress and auth are designed.
    service:
      ui:
        type: ClusterIP

    # Do not make Longhorn the cluster-wide default StorageClass yet.
    persistence:
      defaultClass: false
      defaultClassReplicaCount: 2

    defaultSettings:
      # Only nodes explicitly labeled for Longhorn get an automatic default disk.
      createDefaultDiskLabeledNodes: true
      # This must match the dedicated mount prepared by Ansible.
      defaultDataPath: /var/lib/longhorn
      # Use 2 replicas by default to preserve more usable capacity on 1 TB nodes.
      defaultReplicaCount: 2

    # This is the cluster-wide backup destination Longhorn uses for backup/restore operations.
    # Per-volume or per-workload recurring jobs decide when backups happen, not where they go.
    defaultBackupStore:
      backupTarget: nfs://192.168.1.231:/mnt/user/longhorn-backups
      backupTargetCredentialSecret: null

    # Expose the UI later through Traefik once auth is in front of it.
    ingress:
      enabled: false
