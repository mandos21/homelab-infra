apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: homelab-internal-ca
spec:
  ca:
    # Populate this secret from a SOPS-managed kubernetes.io/tls Secret in cert-manager.
    # The Secret must contain tls.crt and tls.key for the internal CA you want Caddy to trust.
    secretName: homelab-internal-ca-keypair
