apiVersion: certmanager.step.sm/v1beta1
kind: StepClusterIssuer
metadata:
  name: homelab-step-cluster-issuer
spec:
  url: https://stepca.admengyl.lan:9001
  # Base64-encoded PEM for the dedicated k3s step-ca root certificate.
  caBundle: 
  provisioner:
    name: k3s-step-issuer
    # Fill this from k3s/ansible/artifacts/step-ca/admengyl/bootstrap.txt after rerunning the bootstrap playbook.
    kid: RJ0j3PM06YfPSRtN6dpADAdEaGcfDnE2FP6_Boyk96A
    passwordRef:
      name: step-issuer-provisioner-password
      key: password
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: traefik-backend-tls
  namespace: traefik-system
spec:
  secretName: traefik-backend-tls
  commonName: traefik.cluster1.lan
  duration: 720h
  renewBefore: 168h
  issuerRef:
    group: certmanager.step.sm
    kind: StepClusterIssuer
    name: homelab-step-cluster-issuer
  dnsNames:
    - traefik.cluster1.lan
