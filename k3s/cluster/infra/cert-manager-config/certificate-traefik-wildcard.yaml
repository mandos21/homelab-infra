apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: traefik-internal-wildcard
  namespace: traefik-system
spec:
  secretName: traefik-internal-wildcard-tls
  issuerRef:
    kind: ClusterIssuer
    name: homelab-internal-ca
  dnsNames:
    # Replace these with the internal names Caddy will use when re-encrypting to Traefik.
    - '*.k3s.internal'
    - 'k3s.internal'
