apiVersion: batch/v1
kind: CronJob
metadata:
  name: keycloak-pgdump
  namespace: backups
spec:
  schedule: "40 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: pgdump
              image: postgres:18
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - /scripts/pgdump.sh
              envFrom:
                - configMapRef:
                    name: keycloak-backup-config
                - secretRef:
                    name: keycloak-backup-secrets
              volumeMounts:
                - name: backups
                  mountPath: /backups
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: backups-nfs
            - name: scripts
              configMap:
                name: keycloak-backup-scripts
                defaultMode: 0755
