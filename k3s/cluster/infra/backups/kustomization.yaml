apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - shared
  - mattermost
  - keycloak
configMapGenerator:
  - name: mattermost-backup-scripts
    files:
      - shared/common.sh
      - mattermost/scripts/pgdump.sh
      - mattermost/scripts/mmctl-export.sh
  - name: keycloak-backup-scripts
    files:
      - shared/common.sh
      - keycloak/scripts/pgdump.sh
generatorOptions:
  disableNameSuffixHash: true
