apiVersion: v1
kind: Namespace
metadata:
  name: traefik-system
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 1h0s
  url: https://traefik.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik-system
spec:
  interval: 30m0s
  chart:
    spec:
      chart: traefik
      version: "39.0.6"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  values:
    deployment:
      replicas: 2
    ingressClass:
      enabled: true
      isDefaultClass: true
      name: traefik
    service:
      type: LoadBalancer
      spec:
        # Reserve this IP inside the MetalLB pool if you want a fixed Traefik address.
        loadBalancerIP: 192.168.1.2
    nodeSelector:
      node-type: baremetal
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - traefik
              topologyKey: kubernetes.io/hostname
    providers:
      kubernetesIngress:
        publishedService:
          enabled: true
      kubernetesCRD:
        enabled: true
    ports:
      web:
        http:
          redirections:
            entryPoint:
              to: websecure
      websecure:
        http:
          tls:
            enabled: true
