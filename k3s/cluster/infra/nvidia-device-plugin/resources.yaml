apiVersion: v1
kind: Namespace
metadata:
  name: nvidia-device-plugin
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: nvdp
  namespace: flux-system
spec:
  interval: 12h0m0s
  url: https://nvidia.github.io/k8s-device-plugin
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nvidia-device-plugin
  namespace: nvidia-device-plugin
spec:
  interval: 30m0s
  chart:
    spec:
      chart: nvidia-device-plugin
      version: "0.19.1"
      sourceRef:
        kind: HelmRepository
        name: nvdp
        namespace: flux-system
  values:
    config:
      default: default
      map:
        default: |-
          version: v1
          flags:
            migStrategy: none
          sharing:
            timeSlicing:
              renameByDefault: true
              failRequestsGreaterThanOne: true
              resources:
                - name: nvidia.com/gpu
                  replicas: 2
    nodeSelector:
      gpu: nvidia
    affinity: {}
    runtimeClassName: nvidia
