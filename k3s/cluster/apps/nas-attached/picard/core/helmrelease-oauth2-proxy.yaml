apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: picard-oauth2-proxy
  namespace: picard
spec:
  interval: 30m0s
  chart:
    spec:
      chart: oauth2-proxy
      version: "10.4.2"
      sourceRef:
        kind: HelmRepository
        name: oauth2-proxy
        namespace: flux-system
  values:
    replicaCount: 1
    config:
      existingSecret: picard-secrets
      emailDomains:
        - "*"
    alphaConfig:
      enabled: true
      configData:
        providers:
          - id: keycloak
            provider: keycloak-oidc
            clientID: ${OAUTH2_PROXY_CLIENT_ID}
            clientSecret: ${OAUTH2_PROXY_CLIENT_SECRET}
            scope: openid email profile groups
            oidcConfig:
              issuerURL: https://id.mdegenaro.com/realms/theborocrew
        upstreamConfig:
          upstreams:
            - id: picard
              path: /tags/
              uri: http://picard.picard.svc.cluster.local:80/
              passHostHeader: true
              proxyWebSockets: true
              flushInterval: 1s
            - id: picard-websockify
              path: /tags/websockify
              uri: http://picard.picard.svc.cluster.local:80/websockify
              passHostHeader: true
              proxyWebSockets: true
              flushInterval: 1s
            - id: picard-websockify-audio
              path: /tags/websockify-audio
              uri: http://picard.picard.svc.cluster.local:80/websockify-audio
              passHostHeader: true
              proxyWebSockets: true
              flushInterval: 1s
    extraArgs:
      redirect-url: https://music.dege.app/tags/oauth2/callback
      reverse-proxy: "true"
      cookie-secure: "true"
      cookie-samesite: lax
      proxy-prefix: /tags/oauth2
      skip-provider-button: "true"
    service:
      type: ClusterIP
      portNumber: 80
    ingress:
      enabled: true
      className: traefik
      path: /tags
      pathType: Prefix
      hosts:
        - music.dege.app
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
    nodeSelector:
      node-type: vm
