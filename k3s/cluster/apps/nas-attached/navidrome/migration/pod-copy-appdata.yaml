apiVersion: v1
kind: Pod
metadata:
  name: navidrome-copy-appdata
  namespace: navidrome
spec:
  restartPolicy: Never
  nodeSelector:
    node-type: vm
  containers:
    - name: migrate
      image: alpine:3.22
      command:
        - sh
        - -c
        - sleep infinity
      securityContext:
        runAsUser: 0
      volumeMounts:
        - name: source
          mountPath: /source
          readOnly: true
        - name: target
          mountPath: /target
  volumes:
    - name: source
      nfs:
        server: 192.168.1.231
        path: /mnt/user/appdata/navidrome
    - name: target
      persistentVolumeClaim:
        claimName: navidrome-data
