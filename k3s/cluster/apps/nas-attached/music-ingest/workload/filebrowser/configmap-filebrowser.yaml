apiVersion: v1
kind: ConfigMap
metadata:
  name: filebrowser-config
  namespace: music-ingest
  labels:
    app.kubernetes.io/part-of: music-ingest
    app.kubernetes.io/component: filebrowser
data:
  config.yaml.tmpl: |
    server:
      port: 80
      database: /home/filebrowser/data/database.db
      sources:
        - path: /srv/uploads
          name: Uploads
          config:
            defaultEnabled: true
            defaultUserScope: /
            createUserDir: false
    auth:
      adminUsername: admin
      methods:
        password:
          enabled: false
        oidc:
          enabled: true
          clientId: "${FILEBROWSER_OIDC_CLIENT_ID}"
          clientSecret: "${FILEBROWSER_OIDC_CLIENT_SECRET}"
          issuerUrl: "https://id.mdegenaro.com/realms/theborocrew"
          scopes: "email openid profile groups"
          userIdentifier: "preferred_username"
          createUser: true
    userDefaults:
      permissions:
        api: true
        admin: false
        modify: true
        share: false
        realtime: false
        delete: true
        create: true
        download: true
    frontend:
      name: Music Ingest
      description: Upload staging area for beets-based ingestion.
