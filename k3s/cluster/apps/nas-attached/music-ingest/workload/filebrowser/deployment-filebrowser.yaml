apiVersion: apps/v1
kind: Deployment
metadata:
  name: filebrowser
  namespace: music-ingest
  labels:
    app.kubernetes.io/part-of: music-ingest
    app.kubernetes.io/name: filebrowser
    app.kubernetes.io/component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: filebrowser
      app.kubernetes.io/component: ui
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: music-ingest
        app.kubernetes.io/name: filebrowser
        app.kubernetes.io/component: ui
    spec:
      nodeSelector:
        node-type: vm
      securityContext:
        fsGroup: 1000
      containers:
        - name: filebrowser
          image: gtstef/filebrowser:stable-slim
          imagePullPolicy: IfNotPresent
          env:
            - name: FILEBROWSER_CONFIG
              value: /home/filebrowser/data/config.yaml
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: state
              mountPath: /home/filebrowser/data
              subPath: filebrowser
            - name: filebrowser-config
              mountPath: /home/filebrowser/data/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: uploads
              mountPath: /srv/uploads
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: beets-state
        - name: filebrowser-config
          configMap:
            name: filebrowser-config
        - name: uploads
          persistentVolumeClaim:
            claimName: music-ingest-uploads
