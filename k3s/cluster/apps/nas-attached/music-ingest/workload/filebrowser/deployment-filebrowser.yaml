apiVersion: apps/v1
kind: Deployment
metadata:
  name: filebrowser
  namespace: music-ingest
  labels:
    app.kubernetes.io/part-of: music-ingest
    app.kubernetes.io/name: filebrowser
    app.kubernetes.io/component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: filebrowser
      app.kubernetes.io/component: ui
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: music-ingest
        app.kubernetes.io/name: filebrowser
        app.kubernetes.io/component: ui
    spec:
      nodeSelector:
        node-type: vm
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: render-config
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command:
            - /usr/local/bin/python
            - -c
            - |
              from pathlib import Path
              import os

              target_dir = Path("/home/filebrowser/data")
              target_dir.mkdir(parents=True, exist_ok=True)
              template = Path("/config-src/config.yaml.tmpl").read_text()
              template = template.replace("${FILEBROWSER_OIDC_CLIENT_ID}", os.environ["FILEBROWSER_OIDC_CLIENT_ID"])
              template = template.replace("${FILEBROWSER_OIDC_CLIENT_SECRET}", os.environ["FILEBROWSER_OIDC_CLIENT_SECRET"])
              Path("/home/filebrowser/data/config.yaml").write_text(template)
          env:
            - name: FILEBROWSER_OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: music-ingest-secrets
                  key: client-id
            - name: FILEBROWSER_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: music-ingest-secrets
                  key: client-secret
          volumeMounts:
            - name: state
              mountPath: /home/filebrowser/data
              subPath: filebrowser
            - name: filebrowser-config
              mountPath: /config-src
              readOnly: true
      containers:
        - name: filebrowser
          image: gtstef/filebrowser:stable-slim
          imagePullPolicy: IfNotPresent
          env:
            - name: FILEBROWSER_CONFIG
              value: /home/filebrowser/data/config.yaml
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: state
              mountPath: /home/filebrowser/data
              subPath: filebrowser
            - name: uploads
              mountPath: /srv/uploads
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: beets-state
        - name: filebrowser-config
          configMap:
            name: filebrowser-config
        - name: uploads
          persistentVolumeClaim:
            claimName: music-ingest-uploads
