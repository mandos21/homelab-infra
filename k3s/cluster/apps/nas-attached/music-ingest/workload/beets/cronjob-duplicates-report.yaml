apiVersion: batch/v1
kind: CronJob
metadata:
  name: beets-maintenance-duplicates-report
  namespace: music-ingest
  labels:
    app.kubernetes.io/part-of: music-ingest
    app.kubernetes.io/name: beets-maintenance-duplicates-report
    app.kubernetes.io/component: maintenance
spec:
  schedule: "30 4 * * 0"
  timeZone: America/New_York
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/part-of: music-ingest
            app.kubernetes.io/name: beets-maintenance-duplicates-report
        spec:
          restartPolicy: Never
          nodeSelector:
            node-type: vm
          securityContext:
            fsGroup: 1000
          containers:
            - name: beets
              image: ghcr.io/mandos21/music-ingest-beets:latest
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -ec
                - |
                  mkdir -p /uploads/incoming /uploads/review /uploads/rejected /uploads/logs /uploads/tmp
                  beet -c /config/config.yaml duplicates > /uploads/logs/duplicates-tracks.txt
                  beet -c /config/config.yaml duplicates -a > /uploads/logs/duplicates-albums.txt
              env:
                - name: TZ
                  value: America/New_York
                - name: PUID
                  value: "1000"
                - name: PGID
                  value: "1000"
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  memory: 1Gi
              volumeMounts:
                - name: beets-state
                  mountPath: /config
                  subPath: beets
                - name: beets-config
                  mountPath: /config/config.yaml
                  subPath: config.yaml
                  readOnly: true
                - name: beets-support
                  mountPath: /config/lastgenre-ignore.yaml
                  subPath: lastgenre-ignore.yaml
                  readOnly: true
                - name: uploads
                  mountPath: /uploads
                - name: library
                  mountPath: /music
          volumes:
            - name: beets-config
              secret:
                secretName: beets-config
            - name: beets-support
              configMap:
                name: beets-support
            - name: beets-state
              persistentVolumeClaim:
                claimName: beets-state
            - name: uploads
              persistentVolumeClaim:
                claimName: music-ingest-uploads
            - name: library
              persistentVolumeClaim:
                claimName: music-library
