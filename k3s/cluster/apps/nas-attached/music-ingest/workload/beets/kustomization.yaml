apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
generatorOptions:
  disableNameSuffixHash: true
  labels:
    app.kubernetes.io/part-of: music-ingest
    app.kubernetes.io/component: beets
configMapGenerator:
  - name: beets-config
    namespace: music-ingest
    files:
      - config/bootstrap.sh
      - config/config.yaml.tmpl
      - config/lastgenre-ignore.yaml
resources:
  - deployment-beets-admin.yaml
  - cronjob-auto-import.yaml
  - cronjob-mbsync.yaml
  - cronjob-replaygain.yaml
  - cronjob-duplicates-report.yaml
  - job-manual-from-logfile.yaml
  - job-manual-scrub-review.yaml
