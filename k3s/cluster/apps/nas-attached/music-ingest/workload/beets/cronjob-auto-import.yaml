apiVersion: batch/v1
kind: CronJob
metadata:
  name: beets-auto-import
  namespace: music-ingest
  labels:
    app.kubernetes.io/part-of: music-ingest
    app.kubernetes.io/name: beets-auto-import
    app.kubernetes.io/component: worker
spec:
  schedule: "*/30 * * * *"
  timeZone: America/New_York
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 14400
      template:
        metadata:
          labels:
            app.kubernetes.io/part-of: music-ingest
            app.kubernetes.io/name: beets-auto-import
        spec:
          restartPolicy: Never
          nodeSelector:
            node-type: vm
          securityContext:
            fsGroup: 1000
          containers:
            - name: beets
              image: ghcr.io/mandos21/music-ingest-beets:latest
              imagePullPolicy: Always
              command:
                - /bin/sh
                - -ec
                - |
                  mkdir -p /uploads/incoming /uploads/review /uploads/rejected /uploads/logs /uploads/tmp
                  beet -c /config/config.yaml import -i -q -l /uploads/logs/import.log /uploads/incoming
              env:
                - name: TZ
                  value: America/New_York
                - name: PUID
                  value: "1000"
                - name: PGID
                  value: "1000"
              resources:
                requests:
                  cpu: 200m
                  memory: 512Mi
                limits:
                  memory: 2Gi
              volumeMounts:
                - name: beets-state
                  mountPath: /config
                  subPath: beets
                - name: beets-config
                  mountPath: /config/config.yaml
                  subPath: config.yaml
                  readOnly: true
                - name: uploads
                  mountPath: /uploads
                - name: library
                  mountPath: /music
          volumes:
            - name: beets-config
              secret:
                secretName: beets-config
            - name: beets-state
              persistentVolumeClaim:
                claimName: beets-state
            - name: uploads
              persistentVolumeClaim:
                claimName: music-ingest-uploads
            - name: library
              persistentVolumeClaim:
                claimName: music-library
