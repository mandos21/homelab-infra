apiVersion: v1
kind: Pod
metadata:
  name: metadata-import
  namespace: music-ingest
  labels:
    app.kubernetes.io/part-of: music-ingest
    app.kubernetes.io/name: metadata-import
    app.kubernetes.io/component: migration
spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: nimgerianor
  securityContext:
    fsGroup: 999
  containers:
    - name: tools
      image: postgres:17.5
      imagePullPolicy: IfNotPresent
      command:
        - /bin/sh
        - -ec
        - |
          apt-get update
          apt-get install -y --no-install-recommends sqlite3 zstd pv
          rm -rf /var/lib/apt/lists/*
          exec sleep infinity
      envFrom:
        - secretRef:
            name: metadata-postgres
      env:
        - name: PGHOST
          value: metadata-postgres.music-ingest.svc.cluster.local
        - name: PGPORT
          value: "5432"
      volumeMounts:
        - name: source
          mountPath: /source
          readOnly: true
        - name: scratch
          mountPath: /scratch
  volumes:
    - name: source
      hostPath:
        path: /mnt/user/appdata/binhex-qbittorrentvpn/qBittorrent/downloads/annas_archive_spotify_2025_07_metadata
        type: Directory
    - name: scratch
      emptyDir: {}
