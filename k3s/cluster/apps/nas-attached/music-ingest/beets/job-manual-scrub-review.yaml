apiVersion: batch/v1
kind: Job
metadata:
  name: beets-manual-scrub-review
  namespace: music-ingest
  labels:
    app.kubernetes.io/part-of: music-ingest
    app.kubernetes.io/name: beets-manual-scrub-review
    app.kubernetes.io/component: repair
spec:
  suspend: true
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: music-ingest
        app.kubernetes.io/name: beets-manual-scrub-review
    spec:
      restartPolicy: Never
      nodeSelector:
        node-type: vm
      securityContext:
        fsGroup: 1000
      containers:
        - name: beets
          image: ghcr.io/mandos21/music-ingest-beets:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              /config-src/bootstrap.sh
              beet -c /state/config.yaml scrub /uploads/review
          env:
            - name: TZ
              value: America/New_York
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: BEETS_DISCOGS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: music-ingest-secrets
                  key: BEETS_DISCOGS_TOKEN
            - name: BEETS_ACOUSTID_APIKEY
              valueFrom:
                secretKeyRef:
                  name: music-ingest-secrets
                  key: BEETS_ACOUSTID_APIKEY
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: config-src
              mountPath: /config-src
              readOnly: true
            - name: beets-state
              mountPath: /state
              subPath: beets
            - name: uploads
              mountPath: /uploads
            - name: library
              mountPath: /music
      volumes:
        - name: config-src
          configMap:
            name: beets-config
            defaultMode: 0755
        - name: beets-state
          persistentVolumeClaim:
            claimName: beets-state
        - name: uploads
          persistentVolumeClaim:
            claimName: music-ingest-uploads
        - name: library
          persistentVolumeClaim:
            claimName: music-library
