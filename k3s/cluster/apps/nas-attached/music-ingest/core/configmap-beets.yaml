apiVersion: v1
kind: ConfigMap
metadata:
  name: beets-config
  namespace: music-ingest
  labels:
    app.kubernetes.io/part-of: music-ingest
    app.kubernetes.io/component: beets
data:
  bootstrap.sh: |
    #!/bin/sh
    set -eu
    mkdir -p /state /music /uploads/incoming /uploads/review /uploads/rejected /uploads/logs
    python3 - <<'PY'
    from pathlib import Path
    import os

    template = Path('/config-src/config.yaml.tmpl').read_text()
    for key in ('BEETS_DISCOGS_TOKEN', 'BEETS_ACOUSTID_APIKEY'):
        template = template.replace('${%s}' % key, os.environ.get(key, ''))
    Path('/state/config.yaml').write_text(template)
    PY
  config.yaml.tmpl: |
    directory: /music
    library: /state/library.db
    art_filename: cover
    threading: no

    plugins:
      - discogs
      - fetchart
      - embedart
      - lastgenre
      - mbsync
      - duplicates
      - chroma
      - scrub
      - replaygain

    import:
      incremental: yes
      incremental_skip_later: yes
      quiet: yes
      quiet_fallback: skip
      none_rec_action: ask
      group_albums: yes
      write: yes
      copy: yes
      move: no
      delete: no
      from_scratch: no
      timid: no
      log: /uploads/logs/import.log

    match:
      strong_rec_thresh: 0.15

    paths:
      default: $albumartist/$album%aunique{ [$year]}/$track - $title
      singleton: Non-Album/$artist/$title
      comp: Compilations/$album%aunique{ [$year]}/$track - $title

    discogs:
      user_token: ${BEETS_DISCOGS_TOKEN}

    fetchart:
      auto: yes
      cautious: yes
      maxwidth: 1200
      cover_names: cover folder front art album
      sources:
        - filesystem
        - coverart
        - itunes
        - amazon

    embedart:
      auto: yes
      ifempty: yes
      remove_art_file: no

    lastgenre:
      auto: yes
      source: album
      count: 3
      prefer_specific: yes
      whitelist: /config-src/lastgenre-whitelist.txt
      canonical: /config-src/lastgenre-c14n.yaml

    acoustid:
      apikey: ${BEETS_ACOUSTID_APIKEY}

    chroma:
      auto: no

    replaygain:
      backend: ffmpeg
      overwrite: no

    replace:
      '[\/]': _
      '^\.': _
  lastgenre-whitelist.txt: |
    ambient
    blues
    classical
    electronic
    folk
    funk
    hip hop
    jazz
    metal
    pop
    punk
    reggae
    rock
    soul
    soundtrack
  lastgenre-c14n.yaml: |
    hip-hop: hip hop
    hiphop: hip hop
    rnb: r&b
    rhythm and blues: r&b
    alt rock: alternative rock
    indie rock: alternative rock
    synth-pop: synthpop
