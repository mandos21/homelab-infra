apiVersion: v1
kind: PersistentVolume
metadata:
  name: wyoming-faster-whisper-data
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - nfsvers=4.2
  nfs:
    server: 192.168.1.231
    path: /mnt/user/appdata/faster-whisper
