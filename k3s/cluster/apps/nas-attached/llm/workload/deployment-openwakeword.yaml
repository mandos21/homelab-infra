apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwakeword
  namespace: llm
  labels:
    app.kubernetes.io/name: openwakeword
    app.kubernetes.io/component: app
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: openwakeword
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openwakeword
        app.kubernetes.io/component: app
    spec:
      nodeSelector:
        node-type: vm
      terminationGracePeriodSeconds: 30
      containers:
        - name: openwakeword
          image: rhasspy/wyoming-openwakeword:2.1.0
          imagePullPolicy: IfNotPresent
          args:
            - --preload-model
            - ok_nabu
          ports:
            - name: wyoming
              containerPort: 10400
          readinessProbe:
            tcpSocket:
              port: wyoming
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: wyoming
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 2Gi
