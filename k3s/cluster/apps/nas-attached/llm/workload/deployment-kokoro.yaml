apiVersion: apps/v1
kind: Deployment
metadata:
  name: kokoro
  namespace: llm
  labels:
    app.kubernetes.io/name: kokoro
    app.kubernetes.io/component: app
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: kokoro
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kokoro
        app.kubernetes.io/component: app
    spec:
      nodeSelector:
        node-type: vm
      terminationGracePeriodSeconds: 30
      containers:
        - name: kokoro
          image: ghcr.io/relvacode/kokoro-wyoming:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: wyoming
              containerPort: 10210
          readinessProbe:
            tcpSocket:
              port: wyoming
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: wyoming
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 4Gi
