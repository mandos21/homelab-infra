apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-config
  namespace: llm
data:
  TZ: America/New_York
  OLLAMA_HOST: 0.0.0.0:11434
  OLLAMA_ORIGINS: https://chat.dege.app,http://192.168.1.0/24
  NVIDIA_VISIBLE_DEVICES: all
  NVIDIA_DRIVER_CAPABILITIES: compute,utility
  WEBUI_URL: https://chat.dege.app
  ENABLE_OAUTH_PERSISTENT_CONFIG: "False"
  ENABLE_SIGNUP: "False"
  ENABLE_OAUTH_SIGNUP: "True"
  ENABLE_LOGIN_FORM: "False"
  ENABLE_PASSWORD_AUTH: "False"
  ENABLE_PASSWORD_CHANGE_FORM: "False"
  DEFAULT_USER_ROLE: user
  OAUTH_PROVIDER_NAME: Keycloak
  OAUTH_SCOPES: openid email profile
  OPENID_PROVIDER_URL: https://id.dege.app/realms/theborocrew/.well-known/openid-configuration
  OPENID_REDIRECT_URI: https://chat.dege.app/oauth/oidc/callback
  OAUTH_MERGE_ACCOUNTS_BY_EMAIL: "False"
  ENABLE_OAUTH_ROLE_MANAGEMENT: "True"
  OAUTH_ROLES_CLAIM: groups
  OAUTH_ADMIN_ROLES: homelab-admins
  OLLAMA_BASE_URL: http://ollama:11434
