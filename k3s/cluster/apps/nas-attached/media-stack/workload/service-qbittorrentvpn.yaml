apiVersion: v1
kind: Service
metadata:
  name: qbittorrentvpn
  namespace: media-stack
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.1.7
  selector:
    app.kubernetes.io/name: qbittorrentvpn
    app.kubernetes.io/component: app
  ports:
    - name: bittorrent-tcp
      port: 6881
      targetPort: bittorrent-tcp
      protocol: TCP
    - name: bittorrent-udp
      port: 6881
      targetPort: bittorrent-udp
      protocol: UDP
    - name: webui
      port: 8080
      targetPort: webui
      protocol: TCP
    - name: privoxy
      port: 8118
      targetPort: privoxy
      protocol: TCP
