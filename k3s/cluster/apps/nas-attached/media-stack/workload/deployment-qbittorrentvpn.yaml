apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrentvpn
  namespace: media-stack
  labels:
    app.kubernetes.io/name: qbittorrentvpn
    app.kubernetes.io/component: app
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: qbittorrentvpn
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qbittorrentvpn
        app.kubernetes.io/component: app
    spec:
      nodeSelector:
        kubernetes.io/hostname: nimgerianor
      securityContext:
        fsGroup: 100
      containers:
        - name: qbittorrentvpn
          image: binhex/arch-qbittorrentvpn:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: false
            capabilities:
              add:
                - NET_ADMIN
          ports:
            - name: bittorrent-tcp
              containerPort: 6881
              protocol: TCP
            - name: bittorrent-udp
              containerPort: 6881
              protocol: UDP
            - name: webui
              containerPort: 8080
              protocol: TCP
            - name: privoxy
              containerPort: 8118
              protocol: TCP
          env:
            - name: VPN_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: media-stack-config
                  key: VPN_ENABLED
            - name: VPN_USER
              valueFrom:
                secretKeyRef:
                  name: media-stack-secrets
                  key: VPN_USER
            - name: VPN_PASS
              valueFrom:
                secretKeyRef:
                  name: media-stack-secrets
                  key: VPN_PASS
            - name: VPN_PROV
              valueFrom:
                configMapKeyRef:
                  name: media-stack-config
                  key: VPN_PROV
            - name: VPN_CLIENT
              valueFrom:
                configMapKeyRef:
                  name: media-stack-config
                  key: VPN_CLIENT
            - name: VPN_OPTIONS
              valueFrom:
                configMapKeyRef:
                  name: media-stack-config
                  key: VPN_OPTIONS
            - name: STRICT_PORT_FORWARD
              valueFrom:
                configMapKeyRef:
                  name: media-stack-config
                  key: STRICT_PORT_FORWARD
            - name: ENABLE_PRIVOXY
              valueFrom:
                configMapKeyRef:
                  name: media-stack-config
                  key: ENABLE_PRIVOXY
            - name: WEBUI_PORT
              valueFrom:
                configMapKeyRef:
                  name: media-stack-config
                  key: WEBUI_PORT
            - name: LAN_NETWORK
              valueFrom:
                configMapKeyRef:
                  name: media-stack-config
                  key: LAN_NETWORK
            - name: NAME_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: media-stack-config
                  key: NAME_SERVERS
            - name: VPN_INPUT_PORTS
              valueFrom:
                configMapKeyRef:
                  name: media-stack-config
                  key: VPN_INPUT_PORTS
            - name: VPN_OUTPUT_PORTS
              valueFrom:
                configMapKeyRef:
                  name: media-stack-config
                  key: VPN_OUTPUT_PORTS
            - name: DEBUG
              valueFrom:
                configMapKeyRef:
                  name: media-stack-config
                  key: DEBUG
            - name: UMASK
              valueFrom:
                configMapKeyRef:
                  name: media-stack-config
                  key: UMASK
            - name: PUID
              valueFrom:
                configMapKeyRef:
                  name: media-stack-config
                  key: PUID
            - name: PGID
              valueFrom:
                configMapKeyRef:
                  name: media-stack-config
                  key: PGID
          readinessProbe:
            tcpSocket:
              port: webui
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: webui
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /data
            - name: dev-net-tun
              mountPath: /dev/net/tun
          volumeDevices: []
      volumes:
        - name: config
          hostPath:
            path: /srv/unraid/appdata/binhex-qbittorrentvpn
            type: Directory
        - name: downloads
          hostPath:
            path: /srv/unraid/downloads
            type: Directory
        - name: dev-net-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
