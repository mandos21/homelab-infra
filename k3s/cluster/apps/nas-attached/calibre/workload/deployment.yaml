apiVersion: apps/v1
kind: Deployment
metadata:
  name: calibre-web-automated
  namespace: calibre
  labels:
    app.kubernetes.io/name: calibre-web-automated
    app.kubernetes.io/component: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: calibre-web-automated
      app.kubernetes.io/component: app
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: calibre-web-automated
        app.kubernetes.io/component: app
    spec:
      nodeSelector:
        node-type: vm
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 100
      containers:
        - name: calibre-web-automated
          image: crocodilestick/calibre-web-automated:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "99"
            - name: PGID
              value: "100"
            - name: TZ
              value: America/New_York
            - name: UMASK
              value: "002"
          ports:
            - name: http
              containerPort: 8083
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: library
              mountPath: /calibre-library
            - name: uploads
              mountPath: /cwa-book-ingest
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: calibre-config
        - name: library
          persistentVolumeClaim:
            claimName: calibre-library
        - name: uploads
          persistentVolumeClaim:
            claimName: calibre-uploads
