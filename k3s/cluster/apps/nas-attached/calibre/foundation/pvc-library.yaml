apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: calibre-library
  namespace: calibre
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Ti
  storageClassName: ""
  volumeName: calibre-library
