apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: audiomuseai-oauth2-proxy
  namespace: audiomuseai
spec:
  interval: 30m0s
  chart:
    spec:
      chart: oauth2-proxy
      version: "10.4.2"
      sourceRef:
        kind: HelmRepository
        name: oauth2-proxy
        namespace: flux-system
  values:
    replicaCount: 1
    config:
      existingSecret: audiomuseai-oauth2-proxy
      emailDomains:
        - "*"
    alphaConfig:
      enabled: true
      configData:
        providers:
          - id: keycloak
            provider: keycloak-oidc
            clientID: ${OAUTH2_PROXY_CLIENT_ID}
            clientSecret: ${OAUTH2_PROXY_CLIENT_SECRET}
            scope: openid email profile
            oidcConfig:
              issuerURL: https://id.dege.app/realms/theborocrew
        upstreamConfig:
          upstreams:
            - id: audiomuseai
              path: ^/(.*)$
              rewriteTarget: /$1
              uri: http://audiomuseai-audiomuse-ai-flask-service.audiomuseai.svc.cluster.local:8000
              passHostHeader: true
              proxyWebSockets: true
              flushInterval: 1s
    extraArgs:
      redirect-url: https://music-ai.dege.app/oauth2/callback
      reverse-proxy: "true"
      cookie-secure: "true"
      cookie-samesite: lax
      cookie-path: /
      proxy-prefix: /oauth2
      skip-provider-button: "true"
    service:
      type: ClusterIP
      portNumber: 80
    ingress:
      enabled: true
      className: traefik
      path: /
      pathType: Prefix
      hosts:
        - music-ai.dege.app
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
    nodeSelector:
      node-type: vm
