apiVersion: v1
kind: Pod
metadata:
  name: nextcloud-copy-configs
  namespace: nextcloud
spec:
  restartPolicy: Never
  nodeSelector:
    node-type: vm
  containers:
    - name: migrate
      image: alpine:3.22
      command:
        - sh
        - -c
        - sleep infinity
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      volumeMounts:
        - name: source-nextcloud
          mountPath: /source-nextcloud
          readOnly: true
        - name: source-mariadb
          mountPath: /source-mariadb
          readOnly: true
        - name: target-nextcloud
          mountPath: /target-nextcloud
        - name: target-mariadb
          mountPath: /target-mariadb
  volumes:
    - name: source-nextcloud
      nfs:
        server: 192.168.1.231
        path: /mnt/user/appdata/nextcloud
    - name: source-mariadb
      nfs:
        server: 192.168.1.231
        path: /mnt/user/appdata/mariadb
    - name: target-nextcloud
      persistentVolumeClaim:
        claimName: nextcloud-config
    - name: target-mariadb
      persistentVolumeClaim:
        claimName: nextcloud-mariadb
