apiVersion: apps/v1
kind: Deployment
metadata:
  name: mqtt-explorer
  namespace: home-assistant
  labels:
    app.kubernetes.io/name: mqtt-explorer
    app.kubernetes.io/component: ui
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mqtt-explorer
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mqtt-explorer
        app.kubernetes.io/component: ui
    spec:
      nodeSelector:
        longhorn: "enabled"
      terminationGracePeriodSeconds: 30
      containers:
        - name: mqtt-explorer
          image: smeagolworms4/mqtt-explorer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4000
          env:
            - name: HTTP_PORT
              valueFrom:
                configMapKeyRef:
                  name: home-assistant-config
                  key: MQTT_EXPLORER_HTTP_PORT
            - name: HTTP_USER
              valueFrom:
                secretKeyRef:
                  name: home-assistant-secrets
                  key: mqtt-explorer-http-user
            - name: HTTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: home-assistant-secrets
                  key: mqtt-explorer-http-password
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /mqtt-explorer/config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: mqtt-explorer-config
