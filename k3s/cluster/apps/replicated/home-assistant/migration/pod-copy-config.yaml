apiVersion: v1
kind: Pod
metadata:
  name: home-assistant-copy-config
  namespace: home-assistant
spec:
  restartPolicy: Never
  nodeSelector:
    longhorn: "enabled"
  securityContext:
    runAsUser: 99
    runAsGroup: 100
    fsGroup: 100
    supplementalGroups:
      - 100
  containers:
    - name: shell
      image: alpine:3.23
      command: ["/bin/sh", "-c", "sleep infinity"]
      volumeMounts:
        - name: source-mosquitto
          mountPath: /source/mosquitto
          readOnly: true
        - name: target-mosquitto
          mountPath: /target/mosquitto
  volumes:
    - name: source-mosquitto
      nfs:
        server: 192.168.1.231
        path: /mnt/user/appdata/mosquitto
    - name: target-mosquitto
      persistentVolumeClaim:
        claimName: mosquitto-config
