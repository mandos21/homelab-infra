apiVersion: batch/v1
kind: CronJob
metadata:
  name: firefly-cron
  namespace: firefly
  labels:
    app.kubernetes.io/name: firefly
    app.kubernetes.io/component: cron
spec:
  schedule: "0 3 * * *"
  timeZone: America/New_York
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: firefly
            app.kubernetes.io/component: cron
        spec:
          nodeSelector:
            longhorn: "enabled"
          restartPolicy: OnFailure
          containers:
            - name: cron
              image: alpine:3.22
              imagePullPolicy: IfNotPresent
              envFrom:
                - configMapRef:
                    name: firefly-config
                - secretRef:
                    name: firefly-secrets
              command:
                - sh
                - -c
                - wget -qO- "http://firefly/api/v1/cron/${STATIC_CRON_TOKEN}"
