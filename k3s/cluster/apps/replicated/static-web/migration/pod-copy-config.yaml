apiVersion: v1
kind: Pod
metadata:
  name: static-web-copy-config
  namespace: static-web
spec:
  restartPolicy: Never
  nodeSelector:
    longhorn: "enabled"
  containers:
    - name: migrate
      image: alpine:3.22
      command:
        - sh
        - -c
        - sleep infinity
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      volumeMounts:
        - name: source
          mountPath: /source
          readOnly: true
        - name: target
          mountPath: /target
  volumes:
    - name: source
      nfs:
        server: 192.168.1.231
        path: /mnt/user/appdata/binhex-nginx
    - name: target
      persistentVolumeClaim:
        claimName: static-web-config
