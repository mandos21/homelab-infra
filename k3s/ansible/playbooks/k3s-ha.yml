- name: Install k3s HA (embedded etcd)
  hosts: k3s_servers
  become: true
  gather_facts: true

  vars:
    k3s_init_ip: "{{ k3s_api_endpoint | default(hostvars[k3s_init_host].ansible_host) }}"
    k3s_disable_flags: >-
      {% set flags = [] -%}
      {% if k3s_disable_servicelb | default(false) %}{% set _ = flags.append('--disable servicelb') %}{% endif -%}
      {% if k3s_disable_traefik | default(false) %}{% set _ = flags.append('--disable traefik') %}{% endif -%}
      {{ flags | join(' ') }}
    k3s_node_ip: "{{ stor_ip }}"
    k3s_flannel_iface: "{{ stor_iface_name }}"

  tasks:
    - name: Ensure k3s is not already installed
      ansible.builtin.stat:
        path: /usr/local/bin/k3s
      register: k3s_bin

    - name: Install k3s on init node
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | \
          INSTALL_K3S_VERSION={{ K3S_VERSION }} \
          sh -s - server \
          --cluster-init \
          --node-name {{ inventory_hostname }} \
          --node-ip {{ k3s_node_ip }} \
          --flannel-iface {{ k3s_flannel_iface }} \
          --tls-san {{ k3s_api_tls_san }} \
          --write-kubeconfig-mode {{ k3s_write_kubeconfig_mode }} \
          {{ k3s_disable_flags }}
      args:
        executable: /bin/bash
      when:
        - inventory_hostname == k3s_init_host
        - not k3s_bin.stat.exists

    - name: Read k3s node token from init node
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token
      when: inventory_hostname == k3s_init_host

    - name: Set fact for join token
      ansible.builtin.set_fact:
        k3s_join_token: "{{ k3s_token.content | b64decode | trim }}"
      when: inventory_hostname == k3s_init_host

    - name: Wait for API to be reachable on init node
      ansible.builtin.wait_for:
        host: "{{ k3s_init_ip }}"
        port: 6443
        timeout: 300
      when: inventory_hostname == k3s_init_host

    - name: Ensure local artifacts directory exists
      ansible.builtin.file:
        path: k3s/ansible/artifacts
        state: directory
      delegate_to: localhost
      run_once: true

    - name: Install k3s on joining nodes
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | \
          INSTALL_K3S_VERSION={{ K3S_VERSION }} \
          K3S_URL=https://{{ k3s_init_ip }}:6443 \
          K3S_TOKEN={{ hostvars[k3s_init_host].k3s_join_token }} \
          sh -s - server \
          --node-name {{ inventory_hostname }} \
          --node-ip {{ k3s_node_ip }} \
          --flannel-iface {{ k3s_flannel_iface }} \
          --tls-san {{ k3s_api_tls_san }} \
          --write-kubeconfig-mode {{ k3s_write_kubeconfig_mode }} \
          {{ k3s_disable_flags }}
      args:
        executable: /bin/bash
      when:
        - inventory_hostname != k3s_init_host
        - not k3s_bin.stat.exists

    - name: Fetch kubeconfig from init node
      ansible.builtin.fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: k3s/ansible/artifacts/k3s.yaml
        flat: true
      when: inventory_hostname == k3s_init_host
